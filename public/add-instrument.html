<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Instrument</title>
    <link rel="stylesheet" href="css/instruments.css">
</head>
<body>
    <div class="container">
        <h1>Add New Instrument</h1>
        <form id="instrument-form">
            <input type="text" name="name" placeholder="Instrument Name" required>
            <input type="text" name="origin_country" placeholder="Country of Origin" required>
            <textarea name="description" placeholder="Description" required></textarea>
            <input type="url" name="image_url" placeholder="Image URL" required>
            <input type="url" name="video_url" placeholder="Video URL" required>
            <textarea name="historical_background" placeholder="Historical Background" required></textarea>
            <button type="submit" class="btn">Add Instrument</button>
        </form>
    </div>
    <script src="js/add-instrument.js"></script>
</body>
</html>
