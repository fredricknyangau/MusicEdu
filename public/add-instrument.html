<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Instrument</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <h1>Add New Instrument</h1>
        <nav>
            <a href="instruments.html">View Instruments</a>
        </nav>
    </header>
    <main>
        <form id="add-instrument-form">
            <input type="text" id="name" placeholder="Instrument Name" required>
            <input type="text" id="group" placeholder="Instrument Group" required>
            <input type="text" id="region" placeholder="Region" required>
            <input type="url" id="image_url" placeholder="Image URL" required>
            <input type="url" id="video_url" placeholder="Video URL" required>
            <textarea id="history" placeholder="Historical Background" required></textarea>
            <button type="submit">Add Instrument</button>
        </form>
    </main>
    <footer>
        <p>&copy; 2024 Music Education System</p>
    </footer>
    <script src="js/add-instrument.js"></script>
</body>
</html>
