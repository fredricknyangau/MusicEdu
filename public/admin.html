<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - African Musical Instruments</title>
    <link rel="stylesheet" href="css/admin.css"> <!-- Link to the CSS stylesheet -->
</head>
<body>
    <div class="container">
        <header>
            <h1>Admin Dashboard</h1>
            <button id="logout" class="btn">Logout</button> <!-- Logout button -->
        </header>

        <div id="feedback" style="display: none;"></div> <!-- Feedback message display area -->

        <section>
            <h2>Add / Edit Instrument</h2>
            <form id="instrument-form" enctype="multipart/form-data"> <!-- Form for adding/editing instruments -->
                <input type="hidden" id="instrumentId" name="instrumentId"> <!-- Hidden field for instrument ID -->
                <label for="name">Instrument Name:</label>
                <input type="text" id="name" name="name" required>

                <label for="origin_country">Origin Country:</label>
                <input type="text" id="origin_country" name="origin_country" required>

                <label for="categories">Categories:</label>
                <select id="categories" name="categories" multiple required>
                    <option value="1">String Instruments</option>
                    <option value="2">Percussion Instruments</option>
                    <option value="3">Wind Instruments</option>
                    <!-- Add more categories as needed -->
                </select>
                <small>Select multiple categories by holding down the Ctrl (Windows) or Command (Mac) key.</small>

                <label for="image">Image:</label>
                <input type="file" id="image" name="image" accept="image/*" required>

                <label for="video">Video:</label>
                <input type="file" id="video" name="video" accept="video/*" required>

                <label for="description">Description:</label>
                <textarea id="description" name="description" required></textarea>

                <label for="historical_background">Historical Background:</label>
                <textarea id="historical_background" name="historical_background" required></textarea>

                <button type="submit">Add Instrument</button> <!-- Button to submit the form -->
            </form>
        </section>

        <section>
            <h2>Current Instruments</h2>
            <div id="instruments-container"></div> <!-- Placeholder for displaying current instruments -->
        </section>
    </div>

    <script src="js/admin.js"></script> <!-- Link to the JavaScript file -->
</body>
</html>
