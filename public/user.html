<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard - African Musical Instruments</title>
    <link rel="stylesheet" href="css/user.css"> <!-- User-specific styles -->
</head>
<body>
    <div class="container">
        <header>
            <h1>User Dashboard</h1>
            <button id="logout" class="btn">Logout</button>
        </header>

        <section>
            <h2>Available Instruments</h2>
            <div id="feedback" class="feedback-message" style="display:none;"></div>
            <div id="instruments-container" class="instruments-container">
                <!-- Placeholder for displaying instruments -->
            </div>
        </section>

        <div id="feedback-modal" class="modal">
            <div class="modal-content">
                <span class="close" id="closeModal">&times;</span>
                <h2 id="instrumentNameModal"></h2>
                <img id="instrumentImageModal" src="" alt="Instrument Image" class="modal-image">
                <video id="instrumentVideoModal" controls></video>
                <p id="instrumentDescriptionModal"></p>
                <h3>Submit Feedback</h3>
                <form id="feedbackForm">
                    <textarea name="feedback" rows="4" placeholder="Enter your feedback here"></textarea>
                    <button type="submit">Submit Feedback</button>
                </form>
                <div id="feedbackListModal"></div>
            </div>
        </div>
    </div>

    <script src="js/user.js"></script>
</body>
</html>
